<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- NECESARIO PARA MÓVIL -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>App Simulada</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="phone">

  <div class="app">

    <!-- BOTÓN IZQUIERDO -->
    <button class="btn circular left"></button>

    <!-- BOTÓN DERECHO -->
    <button class="btn circular right"></button>

    <!-- INTERRUPTOR -->
    <div class="switch" id="switch"></div>

    <!-- BOTÓN CUADRADO -->
    <label class="square-toggle">
     <input type="checkbox">
     <span class="square">ESCUCHAR</span>
    </label>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
